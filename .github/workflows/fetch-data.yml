name: Fetch Agro Data

on:
  schedule:
    - cron: '0 */2 * * *'   # 每2小时一次 (UTC)
  workflow_dispatch:          # 支持手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch all data
        env:
          AGRO_API_KEY: ${{ secrets.AGRO_API_KEY }}
          POLYGON_ID: ${{ secrets.POLYGON_ID }}
          POLYGON_CENTER_LAT: ${{ secrets.POLYGON_CENTER_LAT }}
          POLYGON_CENTER_LON: ${{ secrets.POLYGON_CENTER_LON }}
        run: node scripts/fetch-data.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "🔄 $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
